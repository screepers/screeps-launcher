name: Update gomod2nix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-gomod2nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Generate gomod2nix
        run: nix develop -c gomod2nix generate

      - name: Create PR with changes
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update gomod2nix'
          title: 'chore: update gomod2nix'
          body: |
            Auto-generated PR to update gomod2nix after go.mod changes.
          branch: gomod2nix-update
          delete-branch: true

      - name: Enable Auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
